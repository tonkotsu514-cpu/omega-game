<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>オメガストライカーズ風</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 16px; font-family: sans-serif; }
canvas { display: block; border-radius: 8px; cursor: crosshair; width: 100%; max-width: 640px; }
#msg { font-size: 13px; color: #aaa; text-align: center; margin: 4px 0; }
#team-ui { display: flex; justify-content: space-between; width: 100%; max-width: 640px; margin: 4px 0; }
.team-block { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 120px; }
.team-label { font-size: 13px; }
.team-players { font-size: 11px; color: #777; }
#controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 6px 0; width: 100%; max-width: 640px; }
#controls button { background: #2a2a4a; color: #ccc; border: 1px solid #555; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; }
#controls button:hover { background: #3a3a6a; }
#controls button.active { background: #4a4aaa; color: #fff; border-color: #88f; }
#score { font-size: 22px; font-weight: 500; color: #fff; text-align: center; margin: 4px 0; }
#bottom-ui { display: flex; align-items: center; gap: 16px; width: 100%; max-width: 640px; margin: 4px 0; flex-wrap: wrap; }
.cd-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cd-bar-wrap span { font-size: 11px; color: #aaa; }
.cd-bar { width: 80px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.cd-fill { height: 100%; border-radius: 3px; transition: width 0.1s; }
#size-wrap { display: flex; align-items: center; gap: 6px; }
#size-wrap label { font-size: 11px; color: #aaa; white-space: nowrap; }
#size-wrap input { width: 80px; }
#skill-select {
  position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 20;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.skill-panel {
  width: min(760px,96vw); background: #1d2240; border: 1px solid #4e5a9a;
  border-radius: 12px; padding: 14px; color: #d6dcff;
}
.skill-panel h2 { font-size: 18px; margin-bottom: 10px; text-align: center; }
.skill-row { margin-bottom: 10px; }
.skill-row h3 { font-size: 14px; margin-bottom: 6px; color: #a8b6ff; }
.palette-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.skill-btn {
  width: 100%; aspect-ratio: 1/1; text-align: center; background: #2a305c; color: #d6dcff;
  border: 1px solid #5a67ad; border-radius: 9px; padding: 6px; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; line-height: 1.2;
  position: relative;
}
.skill-btn.active { background: #4a57a8; border-color: #9fb0ff; color: #fff; }
.skill-name {
  position: absolute; top: 8px; left: 8px; right: 8px;
  font-size: 15px; font-weight: 700; text-align: center;
}
.skill-meta {
  position: absolute; bottom: 6px; left: 6px; right: 6px;
  font-size: 10px; color: #bfccff; text-align: center; line-height: 1.4;
}
#skill-pick-note { font-size: 11px; color: #9ea7d8; margin: 8px 0; text-align: center; }
</style>
</head>
<body>
<div id="msg">WASD:move　LMB:Kick　Shift:Haste　R:Strike Shot</div>
<div id="team-ui">
  <div class="team-block">
    <span class="team-label" style="color:#4a9fd4;">青チーム</span>
    <div class="team-players" id="blue-players">-</div>
  </div>
  <div class="team-block">
    <span class="team-label" style="color:#e05a5a;">赤チーム</span>
    <div class="team-players" id="red-players">-</div>
  </div>
</div>
<div id="controls">
  <button id="btn-pause">⏸ PAUSE</button>
  <button id="btn-add-blue">＋BLUE AI</button>
  <button id="btn-add-red">＋RED AI</button>
  <button id="btn-remove-ai">－DELETE AI</button>
</div>
<div id="score">0 - 0</div>
<canvas id="c"></canvas>
<div id="bottom-ui">
  <div class="cd-bar-wrap">
    <span id="shift-label">Haste (Shift)</span>
    <div class="cd-bar"><div class="cd-fill" id="haste-cd" style="width:100%;background:#4af;"></div></div>
  </div>
  <div class="cd-bar-wrap">
    <span id="r-label">Strike Shot (R)</span>
    <div class="cd-bar"><div class="cd-fill" id="shoot-cd" style="width:100%;background:#fa4;"></div></div>
  </div>
  <div id="size-wrap">
    <label>SIZE: <span id="size-val">1.0</span>x</label>
    <input type="range" id="size-slider" min="0.5" max="2" step="0.1" value="1">
  </div>
</div>
<div id="skill-select">
  <div class="skill-panel">
    <h2>入室前にスキル選択</h2>
    <div class="skill-row">
      <h3>Rスキル (上段から1つ選択)</h3>
      <div class="palette-grid">
        <button class="skill-btn" data-r-skill="strikeShot"><span class="skill-name">Strike Shot</span><span class="skill-meta">CD 5s<br>Shoot a projectile at the core. Aims where your cursor points.</span></button>
        <button class="skill-btn" data-r-skill="debuffKick"><span class="skill-name">Hex Core</span><span class="skill-meta">CD 7s<br>Your next kick curses the core. Enemy who touches it gets stunned.</span></button>
        <button class="skill-btn" data-r-skill="guardWall"><span class="skill-name">Guard Wall</span><span class="skill-meta">CD 7s<br>Place a wall near you that blocks the core for a few seconds.</span></button>
        <button class="skill-btn" data-r-skill="coreGuard"><span class="skill-name">Core Guard</span><span class="skill-meta">CD 5s<br>Shields around you deflect the core away.</span></button>
      </div>
    </div>
    <div class="skill-row">
      <h3>Shiftスキル (下段から1つ選択)</h3>
      <div class="palette-grid">
        <button class="skill-btn" data-shift-skill="blink"><span class="skill-name">Blink</span><span class="skill-meta">CD 5s<br>Instantly teleport toward your cursor.</span></button>
        <button class="skill-btn" data-shift-skill="giant"><span class="skill-name">Giant</span><span class="skill-meta">CD 6s / 1s<br>Briefly become huge. Bigger body = stronger kicks.</span></button>
        <button class="skill-btn" data-shift-skill="rushLock"><span class="skill-name">Rush Lock</span><span class="skill-meta">CD 7s / 2s<br>Rush toward your cursor. Can't act during the rush.</span></button>
        <button class="skill-btn" data-shift-skill="haste"><span class="skill-name">Haste</span><span class="skill-meta">CD 7s<br>Boost your movement speed for 3 seconds.</span></button>
      </div>
    </div>
    <div id="skill-pick-note">RとShiftを1つ選んだ瞬間に入室するにゃ</div>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
var W=640,H=400,GOAL_W=18,GOAL_H=180,CORE_R=14,PLAYER_R=18,FRICTION=0.992,KICK_FORCE=5.1,PLAYER_SPEED=2.4,HASTE_SPEED=3.8,KICK_RANGE=PLAYER_R+CORE_R+10,HASTE_DURATION=3000,HASTE_CD=7000,BLINK_CD=5000,GIANT_CD=6000,RUSH_LOCK_CD=7000,GIANT_DURATION=1000,RUSH_LOCK_DURATION=2000,BLINK_DISTANCE=72,RUSH_SPEED_MULT=2.3,GIANT_MULT=1.8,SHOOT_CD=5000,DEBUFF_KICK_CD=7000,WALL_CD=7000,CORE_GUARD_CD=5000,KICK_CD=900,SHOOT_FORCE=7,SHOOT_R=5,AI_HASTE_CD=13000,WALL_DURATION=4000,WALL_WIDTH=PLAYER_R*2,WALL_HEIGHT=PLAYER_R*6,CORE_DEBUFF_MS=2000,DEBUFF_STUN_MS=1000,CORE_GUARD_MS=5000,AI_SPEED_MULT=1.14,AI_ACCEL=0.5;
var score=[0,0],keysByCode={},goalFlash=0,goalTeam=-1,mouseX=W/2,mouseY=H/2,core,players,projectiles=[],remotePlayers={},remoteBots={},isHost=false,paused=false,dragTarget=null,dragOffX=0,dragOffY=0,playerSize=1.0,lastTime=0,shiftCdLeft=0,hasteActive=false,hasteEnd=0,giantUntil=0,rushLockUntil=0,rSkillCdLeft=0,kickCdLeft=0,myPlayerNumber=1,selectedRSkill='',selectedShiftSkill='',coreDebuffUntil=0,coreDebuffTeam=-1,localDisabledUntil=0,coreGuardUntil=0,walls=[],socket=null,aiUidCounter=1,localAvatarCode='aaa',mySpawnedBotIds=[],_hostSyncTick=0,_coreBuffer=[];
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=W;canvas.height=H;

function runAsHost(){
  return !socket||!socket.connected||isHost;
}

function updateTeamDisplay(){
  var bl=[],rl=[];
  if(players[0].team===0)bl.push('プレイヤー'+myPlayerNumber+'(あなた)');
  else rl.push('プレイヤー'+myPlayerNumber+'(あなた)');
  Object.keys(remotePlayers).forEach(function(id){
    var rp=remotePlayers[id],n=rp.playerNumber||'?';
    if(rp.team===0)bl.push('プレイヤー'+n);else rl.push('プレイヤー'+n);
  });
  document.getElementById('blue-players').textContent=bl.length?bl.join(' / '):'-';
  document.getElementById('red-players').textContent=rl.length?rl.join(' / '):'-';
}

function checkWin(){
  var a=score[0],b=score[1];
  if((a>=5||b>=5)&&Math.abs(a-b)>=2){
    goalFlash=180;goalTeam=a>b?0:1;
    score=[0,0];document.getElementById('score').textContent='0 - 0';
    fullReset();return true;
  }return false;
}

function makeCore(){return{x:W/2,y:H/2,vx:0,vy:0};}
function randomAiRSkill(){
  var skills=['strikeShot','debuffKick','guardWall','coreGuard'];
  return skills[Math.floor(Math.random()*skills.length)];
}
function randomAiShiftSkill(){
  var skills=['blink','giant','rushLock','haste'];
  return skills[Math.floor(Math.random()*skills.length)];
}
function makePlayer(x,y,color,team,isPlayer){
  return{x:x,y:y,vx:0,vy:0,color:color,team:team,isPlayer:isPlayer,hasteActive:false,hasteEnd:0,hasteCdLeft:0,aiHasteCd:Math.random()*AI_HASTE_CD,aiState:'chase',aiRSkill:randomAiRSkill(),aiShiftSkill:randomAiShiftSkill(),aiRcdLeft:Math.random()*2200,aiShiftCdLeft:Math.random()*1600,aiKickCdLeft:Math.random()*KICK_CD,disabledUntil:0,coreGuardUntil:0,pendingDebuffKick:false,giantUntil:0,rushUntil:0,aiUid:isPlayer?0:aiUidCounter++,netBotId:null,ownerId:null};
}
function makePlayers(){return[makePlayer(160,H/2,'#4a9fd4',0,true),makePlayer(W-160,H/2,'#e05a5a',1,false)];}
function reset(){
  core=makeCore();core.vx=(Math.random()-0.5)*1.65;core.vy=(Math.random()-0.5)*1.65;
  players.forEach(function(p){p.x=p.team===0?160:W-160;p.y=H/2;p.vx=0;p.vy=0;});
  projectiles=[];
  walls=[];
  coreDebuffUntil=0;coreDebuffTeam=-1;
  giantUntil=0;rushLockUntil=0;
}
function fullReset(){
  // ボットは消さずに残す
  var savedBots=(players&&players.length)
    ? players.filter(function(p){return !p.isPlayer;})
    : [];
  players=makePlayers();
  savedBots.forEach(function(b){players.push(b);});
  core=makeCore();
  core.vx=(Math.random()-0.5)*1.65;core.vy=(Math.random()-0.5)*1.65;projectiles=[];walls=[];
  coreDebuffUntil=0;coreDebuffTeam=-1;
  giantUntil=0;rushLockUntil=0;
}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function avatarCodeFromAddressLike(str){
  var s=(str||'aaa').toString().toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!s)s='aaa';
  if(s.length<3)s=('aaa'+s).slice(-3);
  return s.slice(-3);
}
function charBucket9(ch){
  var c=(ch||'a').toLowerCase();
  if(c>='0'&&c<='9')return 8;
  var code=c.charCodeAt(0);
  if(code<97||code>122)return 8;
  // a-z -> 0..7, digits -> 8
  return Math.min(7,Math.floor((code-97)/4));
}
function avatarParts(code){
  var c=avatarCodeFromAddressLike(code);
  var hairIdx=charBucket9(c[0]),eyeIdx=charBucket9(c[1]),mouthIdx=charBucket9(c[2]);
  var palette=['#f6d365','#7ee6ff','#b7ff95','#ff7a7a','#c8a8ff','#ffd992','#98f0c1','#f2f2f2','#ff4d4d'];
  return{hairIdx:hairIdx,eyeIdx:eyeIdx,mouthIdx:mouthIdx,accent:palette[mouthIdx]};
}
function drawAvatarFace(x,y,r,code){
  var p=avatarParts(code);
  ctx.fillStyle=p.accent;
  switch(p.hairIdx){
    case 0: ctx.fillRect(x-r*0.62,y-r*0.72,r*1.24,r*0.22); break;
    case 1: ctx.beginPath();ctx.arc(x,y-r*0.26,r*0.86,Math.PI,Math.PI*2);ctx.fill();break;
    case 2: for(var i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(x+i*r*0.2,y-r*0.65);ctx.lineTo(x+i*r*0.14,y-r*0.95);ctx.lineTo(x+i*r*0.08,y-r*0.62);ctx.fill();}break;
    case 3: ctx.fillRect(x-r*0.74,y-r*0.74,r*0.24,r*0.52);ctx.fillRect(x+r*0.5,y-r*0.74,r*0.24,r*0.52);break;
    case 4: ctx.beginPath();ctx.arc(x-r*0.46,y-r*0.48,r*0.22,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*0.46,y-r*0.48,r*0.22,0,Math.PI*2);ctx.fill();break;
    case 5: ctx.fillRect(x-r*0.72,y-r*0.68,r*1.44,r*0.18);ctx.fillRect(x-r*0.18,y-r*0.86,r*0.36,r*0.2);break;
    case 6: ctx.beginPath();ctx.arc(x,y-r*0.55,r*0.3,0,Math.PI*2);ctx.fill();break;
    case 7: ctx.fillRect(x-r*0.7,y-r*0.72,r*1.4,r*0.2);ctx.fillRect(x-r*0.7,y-r*0.52,r*0.18,r*0.28);ctx.fillRect(x+r*0.52,y-r*0.52,r*0.18,r*0.28);break;
    default: ctx.beginPath();ctx.arc(x,y-r*0.32,r*0.9,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(x-r*0.66,y-r*0.5,r*1.32,r*0.18);break;
  }
  ctx.strokeStyle='#1a1a1a';ctx.fillStyle='#111';ctx.lineWidth=2;
  switch(p.eyeIdx){
    case 0: ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.03,r*0.08,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(x+r*0.2,y-r*0.03,r*0.08,0,Math.PI*2);ctx.stroke();break;
    case 1: ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.03,r*0.06,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*0.2,y-r*0.03,r*0.06,0,Math.PI*2);ctx.fill();break;
    case 2: ctx.beginPath();ctx.moveTo(x-r*0.35,y-r*0.06);ctx.lineTo(x-r*0.08,y-r*0.09);ctx.stroke();ctx.beginPath();ctx.moveTo(x+r*0.08,y-r*0.09);ctx.lineTo(x+r*0.35,y-r*0.06);ctx.stroke();break;
    case 3: ctx.beginPath();ctx.moveTo(x-r*0.33,y-r*0.1);ctx.lineTo(x-r*0.1,y+r*0.02);ctx.stroke();ctx.beginPath();ctx.moveTo(x+r*0.1,y+r*0.02);ctx.lineTo(x+r*0.33,y-r*0.1);ctx.stroke();break;
    case 4: ctx.beginPath();ctx.arc(x-r*0.22,y-r*0.04,r*0.09,Math.PI,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(x+r*0.22,y-r*0.04,r*0.09,Math.PI,Math.PI*2);ctx.stroke();break;
    case 5: ctx.beginPath();ctx.rect(x-r*0.28,y-r*0.11,r*0.14,r*0.1);ctx.stroke();ctx.beginPath();ctx.rect(x+r*0.14,y-r*0.11,r*0.14,r*0.1);ctx.stroke();break;
    case 6: ctx.beginPath();ctx.moveTo(x-r*0.33,y-r*0.03);ctx.lineTo(x-r*0.08,y-r*0.03);ctx.stroke();ctx.beginPath();ctx.moveTo(x+r*0.08,y-r*0.03);ctx.lineTo(x+r*0.33,y-r*0.03);ctx.stroke();break;
    case 7: ctx.beginPath();ctx.moveTo(x-r*0.3,y-r*0.12);ctx.lineTo(x-r*0.14,y-r*0.02);ctx.lineTo(x-r*0.3,y+r*0.02);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(x+r*0.3,y-r*0.12);ctx.lineTo(x+r*0.14,y-r*0.02);ctx.lineTo(x+r*0.3,y+r*0.02);ctx.closePath();ctx.fill();break;
    default: ctx.beginPath();ctx.arc(x-r*0.2,y-r*0.03,r*0.11,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+r*0.2,y-r*0.03,r*0.11,0,Math.PI*2);ctx.fill();break;
  }
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.7;
  switch(p.mouthIdx){
    case 0: ctx.beginPath();ctx.arc(x,y+r*0.17,r*0.2,0,Math.PI,false);ctx.stroke();break;
    case 1: ctx.beginPath();ctx.moveTo(x-r*0.16,y+r*0.22);ctx.lineTo(x+r*0.16,y+r*0.22);ctx.stroke();break;
    case 2: ctx.beginPath();ctx.arc(x,y+r*0.24,r*0.16,Math.PI,Math.PI*2);ctx.stroke();break;
    case 3: ctx.beginPath();ctx.moveTo(x-r*0.14,y+r*0.2);ctx.lineTo(x-r*0.02,y+r*0.14);ctx.lineTo(x+r*0.14,y+r*0.2);ctx.stroke();break;
    case 4: ctx.beginPath();ctx.arc(x,y+r*0.22,r*0.09,0,Math.PI*2);ctx.stroke();break;
    case 5: ctx.beginPath();ctx.moveTo(x-r*0.12,y+r*0.24);ctx.lineTo(x+r*0.12,y+r*0.16);ctx.stroke();break;
    case 6: ctx.beginPath();ctx.moveTo(x-r*0.12,y+r*0.16);ctx.lineTo(x+r*0.12,y+r*0.24);ctx.stroke();break;
    case 7: ctx.beginPath();ctx.rect(x-r*0.08,y+r*0.16,r*0.16,r*0.08);ctx.stroke();break;
    default: ctx.beginPath();ctx.arc(x,y+r*0.21,r*0.23,0,Math.PI,false);ctx.stroke();ctx.beginPath();ctx.moveTo(x-r*0.14,y+r*0.21);ctx.lineTo(x+r*0.14,y+r*0.21);ctx.stroke();break;
  }
}
function playJoinChime(){
  try{
    var audioCtx=playJoinChime.ctx||(playJoinChime.ctx=new (window.AudioContext||window.webkitAudioContext)());
    var now=audioCtx.currentTime;
    function tone(freq,start,duration,gain){
      var osc=audioCtx.createOscillator();
      var g=audioCtx.createGain();
      osc.type='sine';
      osc.frequency.value=freq;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(gain,start+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,start+duration);
      osc.connect(g);g.connect(audioCtx.destination);
      osc.start(start);osc.stop(start+duration+0.02);
    }
    // Discord-like short bright join chirp
    tone(880,now,0.11,0.08);
    tone(1174,now+0.09,0.16,0.09);
  }catch(e){}
}

function clearInputState(){
  keysByCode={};
}
function getRSkillCd(skill){
  if(skill==='debuffKick')return DEBUFF_KICK_CD;
  if(skill==='guardWall')return WALL_CD;
  if(skill==='coreGuard')return CORE_GUARD_CD;
  return SHOOT_CD;
}
function getShiftSkillCd(skill){
  if(skill==='blink')return BLINK_CD;
  if(skill==='giant')return GIANT_CD;
  if(skill==='rushLock')return RUSH_LOCK_CD;
  return HASTE_CD;
}
function localSizeMultiplier(){
  return performance.now()<giantUntil?GIANT_MULT:1;
}
function rushLockActive(){
  return performance.now()<rushLockUntil;
}
function selectedRSkillLabel(skill){
  if(!skill)return'R Skill (未選択)';
  if(skill==='debuffKick')return'Hex Core (R)';
  if(skill==='guardWall')return'Guard Wall (R)';
  if(skill==='coreGuard')return'Core Guard (R)';
  return'Strike Shot (R)';
}
function selectedShiftSkillLabel(skill){
  if(!skill)return'Shift Skill (未選択)';
  if(skill==='blink')return'Blink (Shift)';
  if(skill==='giant')return'Giant (Shift)';
  if(skill==='rushLock')return'Rush Lock (Shift)';
  if(skill==='haste')return'Haste (Shift)';
  return'Coming Soon (Shift)';
}
function activateShiftSkill(){
  var p=players[0];
  if(selectedShiftSkill==='blink'){
    var dx=mouseX-p.x,dy=mouseY-p.y,len=Math.hypot(dx,dy)||1;
    var move=BLINK_DISTANCE*localSizeMultiplier();
    var pr=PLAYER_R*playerSize*localSizeMultiplier();
    p.x=clamp(p.x+(dx/len)*move,pr,W-pr);
    p.y=clamp(p.y+(dy/len)*move,pr,H-pr);
    return;
  }
  if(selectedShiftSkill==='giant'){
    giantUntil=performance.now()+GIANT_DURATION;
    return;
  }
  if(selectedShiftSkill==='rushLock'){
    rushLockUntil=performance.now()+RUSH_LOCK_DURATION;
    return;
  }
  hasteActive=true;hasteEnd=performance.now()+HASTE_DURATION;
  if(socket&&socket.connected)socket.emit('haste',{id:socket.id});
}
function applyCoreKick(vx,vy,kickerTeam,kickerRef,kickerId,canConsumeDebuff){
  core.vx=vx;core.vy=vy;
  var debuffTriggered=false;
  if(canConsumeDebuff&&kickerRef&&kickerRef.pendingDebuffKick){
    coreDebuffUntil=performance.now()+CORE_DEBUFF_MS;
    coreDebuffTeam=kickerTeam;
    kickerRef.pendingDebuffKick=false;
    debuffTriggered=true;
  }else if(coreDebuffUntil>performance.now()&&kickerTeam!==coreDebuffTeam){
    if(kickerRef){kickerRef.disabledUntil=performance.now()+DEBUFF_STUN_MS;}
    if(kickerId&&remotePlayers[kickerId])remotePlayers[kickerId].disabledUntil=performance.now()+DEBUFF_STUN_MS;
    if(kickerRef&&kickerRef.isPlayer)localDisabledUntil=Math.max(localDisabledUntil,performance.now()+DEBUFF_STUN_MS);
    coreDebuffUntil=0;coreDebuffTeam=-1;
  }
  if(socket&&socket.connected)socket.emit('coreKick',{vx:core.vx,vy:core.vy,team:kickerTeam,kickerId:kickerId||null,debuffTriggered:debuffTriggered,debuffTeam:kickerTeam});
}
function spawnWall(owner,ownerId,isRemote){
  var tx=owner.isPlayer?mouseX:core.x,ty=owner.isPlayer?mouseY:core.y;
  var dx=tx-owner.x,dy=ty-owner.y,len=Math.hypot(dx,dy)||1;
  var wall={x:owner.x+(dx/len)*78,y:owner.y+(dy/len)*78,w:WALL_WIDTH,h:WALL_HEIGHT,expiresAt:performance.now()+WALL_DURATION,team:owner.team};
  walls.push(wall);
  if(!isRemote&&socket&&socket.connected)socket.emit('skillEvent',{type:'wall',x:wall.x,y:wall.y,team:owner.team});
}
function activateRSkill(player,skillName,isAi,remoteId){
  if(skillName==='debuffKick'){player.pendingDebuffKick=true;return;}
  if(skillName==='guardWall'){spawnWall(player,remoteId,false);return;}
  if(skillName==='coreGuard'){
    player.coreGuardUntil=performance.now()+CORE_GUARD_MS;
    if(player.isPlayer)coreGuardUntil=player.coreGuardUntil;
    return;
  }
  var dx=mouseX-player.x,dy=mouseY-player.y,len=Math.hypot(dx,dy)||1;
  var proj={x:player.x,y:player.y,vx:(dx/len)*SHOOT_FORCE,vy:(dy/len)*SHOOT_FORCE};
  projectiles.push(proj);
  if(socket&&socket.connected)socket.emit('shoot',{x:proj.x,y:proj.y,vx:proj.vx,vy:proj.vy});
}
function resolveCircleWallCollision(obj,radius,reflectLikeWall){
  for(var i=walls.length-1;i>=0;i--){
    var wall=walls[i];
    if(wall.expiresAt<=performance.now()){walls.splice(i,1);continue;}
    var nearestX=clamp(obj.x,wall.x-wall.w/2,wall.x+wall.w/2);
    var nearestY=clamp(obj.y,wall.y-wall.h/2,wall.y+wall.h/2);
    var dx=obj.x-nearestX,dy=obj.y-nearestY,distSq=dx*dx+dy*dy;
    if(distSq<radius*radius){
      var dist=Math.sqrt(distSq)||0.001;
      var nx=dx/dist,ny=dy/dist,push=radius-dist;
      obj.x+=nx*push;obj.y+=ny*push;
      if(reflectLikeWall&&obj.vx!==undefined&&obj.vy!==undefined){
        var dot=obj.vx*nx+obj.vy*ny;
        if(dot<0){
          obj.vx=(obj.vx-2*dot*nx)*0.8;
          obj.vy=(obj.vy-2*dot*ny)*0.8;
        }
      }else{
        if(obj.vx!==undefined)obj.vx*=0.55;
        if(obj.vy!==undefined)obj.vy*=0.55;
      }
    }
  }
}
function resolveCoreGuardCollision(player,delta){
  var guardUntil=player.isPlayer?coreGuardUntil:player.coreGuardUntil;
  if(guardUntil<=performance.now())return;
  var pr=player.isPlayer?PLAYER_R*playerSize:PLAYER_R;
  var dx=core.x-player.x,dy=core.y-player.y,d=Math.hypot(dx,dy)||0.001,minDist=pr+CORE_R;
  if(d<minDist){
    var nx=dx/d,ny=dy/d,overlap=minDist-d;
    core.x+=nx*overlap;core.y+=ny*overlap;
    var pushStrength=0.22*delta;
    core.vx+=nx*pushStrength*(Math.hypot(player.vx,player.vy)+2);
    core.vy+=ny*pushStrength*(Math.hypot(player.vx,player.vy)+2);
  }
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function aiRole(ai){
  var allies=players.filter(function(p){return !p.isPlayer&&p.team===ai.team;}).sort(function(a,b){return a.aiUid-b.aiUid;});
  if(allies.length<=1)return'attacker';
  var idx=allies.indexOf(ai);
  if(idx===0)return'attacker';
  if(idx===1)return'defender';
  return'support';
}
function predictCorePosition(framesAhead){
  var t=clamp(framesAhead,0,60);
  return{
    x:clamp(core.x+core.vx*t,CORE_R+GOAL_W,W-CORE_R-GOAL_W),
    y:clamp(core.y+core.vy*t,CORE_R,H-CORE_R)
  };
}
function aiTargetForState(ai,state){
  var role=aiRole(ai),future=predictCorePosition(role==='attacker'?24:16);
  var defendLineX=ai.team===0?Math.max(120,GOAL_W+84):Math.min(W-120,W-GOAL_W-84);
  if(role==='defender'){
    return{x:defendLineX,y:clamp(future.y,80,H-80)};
  }
  if(role==='support'){
    var supportX=ai.team===0?future.x-90:future.x+90;
    var supportY=future.y+(ai.aiUid%2===0?-56:56);
    return{x:clamp(supportX,80,W-80),y:clamp(supportY,70,H-70)};
  }
  if(state==='defend')return{x:defendLineX,y:future.y};
  if(state==='shoot'){
    var behindX=ai.team===0?future.x-30:future.x+30;
    return{x:clamp(behindX,60,W-60),y:future.y};
  }
  var pressureX=ai.team===0?future.x+24:future.x-24;
  return{x:clamp(pressureX,70,W-70),y:future.y};
}
function chooseAiState(ai){
  var role=aiRole(ai);
  var ownGoalX=ai.team===0?GOAL_W:W-GOAL_W;
  var attackGoalX=ai.team===0?W-GOAL_W:GOAL_W;
  var distToCore=Math.hypot(ai.x-core.x,ai.y-core.y);
  var coreNearOwnGoal=Math.abs(core.x-ownGoalX)<140;
  var hasShotLane=Math.abs(core.y-H/2)<95&&Math.abs(core.x-attackGoalX)<250;
  if(role==='defender')return'defend';
  if(role==='support'&&coreNearOwnGoal)return'defend';
  if(coreNearOwnGoal)return'defend';
  if(distToCore<KICK_RANGE+16&&hasShotLane)return'shoot';
  return'chase';
}
function aiSeparationForce(ai){
  var allies=players.filter(function(p){return p!==ai&&!p.isPlayer&&p.team===ai.team;});
  var fx=0,fy=0,minDist=74;
  allies.forEach(function(o){
    var dx=ai.x-o.x,dy=ai.y-o.y,d=Math.hypot(dx,dy)||0.001;
    if(d<minDist){
      var strength=(minDist-d)/minDist;
      fx+=(dx/d)*strength;
      fy+=(dy/d)*strength;
    }
  });
  return{x:fx,y:fy};
}
function aiTryKick(ai){
  if(ai.aiKickCdLeft>0||dist(ai,core)>KICK_RANGE)return;
  ai.aiKickCdLeft=KICK_CD;
  var targetX=ai.team===0?W*0.96:W*0.04;
  var targetY=H/2;
  var toGoalX=targetX-core.x,toGoalY=targetY-core.y;
  var len=Math.hypot(toGoalX,toGoalY)||1;
  var laneBias=Math.abs(core.y-H/2)<GOAL_H*0.52?1.0:0.78;
  var closeBoost=dist(ai,core)<KICK_RANGE*0.82?1.08:1.0;
  applyCoreKick((toGoalX/len)*KICK_FORCE*laneBias*closeBoost,(toGoalY/len)*KICK_FORCE*laneBias*closeBoost,ai.team,ai,null,true);
}
function aiActivateShift(ai,target){
  if(ai.aiShiftSkill==='blink'){
    var dx=target.x-ai.x,dy=target.y-ai.y,len=Math.hypot(dx,dy)||1;
    ai.x=clamp(ai.x+(dx/len)*BLINK_DISTANCE,PLAYER_R,W-PLAYER_R);
    ai.y=clamp(ai.y+(dy/len)*BLINK_DISTANCE,PLAYER_R,H-PLAYER_R);
    return;
  }
  if(ai.aiShiftSkill==='giant'){ai.giantUntil=performance.now()+GIANT_DURATION;return;}
  if(ai.aiShiftSkill==='rushLock'){ai.rushUntil=performance.now()+RUSH_LOCK_DURATION;return;}
  ai.hasteActive=true;ai.hasteEnd=performance.now()+HASTE_DURATION;
}
function aiTryUseSkills(ai,target){
  var now=performance.now();
  if(ai.aiShiftCdLeft<=0){
    var urgentDefend=Math.abs(core.x-(ai.team===0?GOAL_W:W-GOAL_W))<130;
    var closeToCore=dist(ai,core)<120;
    if(urgentDefend||closeToCore){
      ai.aiShiftCdLeft=getShiftSkillCd(ai.aiShiftSkill);
      aiActivateShift(ai,target);
    }
  }
  if(ai.aiRcdLeft<=0){
    var canUseR=Math.random()<0.03||dist(ai,core)<KICK_RANGE+22;
    if(canUseR&&now>ai.rushUntil){
      ai.aiRcdLeft=getRSkillCd(ai.aiRSkill);
      activateRSkill(ai,ai.aiRSkill,true,null);
    }
  }
}
function aiMove(ai,delta){
  if(ai.disabledUntil>performance.now()){ai.vx=0;ai.vy=0;return;}
  var now=performance.now();
  var rushing=now<ai.rushUntil;
  var speed=ai.hasteActive?HASTE_SPEED:PLAYER_SPEED;
  if(rushing)speed=PLAYER_SPEED*RUSH_SPEED_MULT;
  speed*=AI_SPEED_MULT;
  if(ai.aiRcdLeft>0)ai.aiRcdLeft=Math.max(0,ai.aiRcdLeft-delta*16.67);
  if(ai.aiShiftCdLeft>0)ai.aiShiftCdLeft=Math.max(0,ai.aiShiftCdLeft-delta*16.67);
  if(ai.aiKickCdLeft>0)ai.aiKickCdLeft=Math.max(0,ai.aiKickCdLeft-delta*16.67);
  ai.aiHasteCd-=delta*16.67;
  if(ai.aiHasteCd<=0&&!ai.hasteActive&&ai.aiShiftSkill==='haste'){ai.hasteActive=true;ai.hasteEnd=now+HASTE_DURATION;ai.aiHasteCd=AI_HASTE_CD+Math.random()*5000;}
  if(ai.hasteActive&&performance.now()>ai.hasteEnd)ai.hasteActive=false;
  ai.aiState=chooseAiState(ai);
  var target=aiTargetForState(ai,ai.aiState);
  aiTryUseSkills(ai,target);
  var tx=target.x,ty=target.y,dx=tx-ai.x,dy=ty-ai.y,d=Math.hypot(dx,dy);
  if(d>4){ai.vx+=(dx/d)*AI_ACCEL*delta;ai.vy+=(dy/d)*AI_ACCEL*delta;}
  var sep=aiSeparationForce(ai);
  ai.vx+=sep.x*0.36*delta;
  ai.vy+=sep.y*0.36*delta;
  var spd=Math.hypot(ai.vx,ai.vy);if(spd>speed){ai.vx=ai.vx/spd*speed;ai.vy=ai.vy/spd*speed;}
  if(rushing)return;
  if(ai.aiState==='shoot'){aiTryKick(ai);return;}
  if(dist(ai,core)<KICK_RANGE&&Math.random()<0.03)aiTryKick(ai);
}

function updatePlayer(p,delta){
  var aiSizeMult=!p.isPlayer&&performance.now()<p.giantUntil?GIANT_MULT:1;
  var pr=p.isPlayer?PLAYER_R*playerSize*localSizeMultiplier():PLAYER_R*aiSizeMult;
  if(p.isPlayer){
    if(performance.now()<=localDisabledUntil){p.vx=0;p.vy=0;}
    if(hasteActive&&performance.now()>hasteEnd)hasteActive=false;
    var speed=hasteActive?HASTE_SPEED:PLAYER_SPEED;
    if(rushLockActive())speed=PLAYER_SPEED*RUSH_SPEED_MULT;
    if(performance.now()>localDisabledUntil){
      if(keysByCode['KeyW']||keysByCode['ArrowUp'])p.vy-=speed*delta;
      if(keysByCode['KeyS']||keysByCode['ArrowDown'])p.vy+=speed*delta;
      if(keysByCode['KeyA']||keysByCode['ArrowLeft'])p.vx-=speed*delta;
      if(keysByCode['KeyD']||keysByCode['ArrowRight'])p.vx+=speed*delta;
    }
    var spd=Math.hypot(p.vx,p.vy);if(spd>speed){p.vx=p.vx/spd*speed;p.vy=p.vy/spd*speed;}
  }else{if(runAsHost())aiMove(p,delta);}
  p.vx*=Math.pow(0.75,delta);p.vy*=Math.pow(0.75,delta);
  p.x+=p.vx*delta;p.y+=p.vy*delta;
  p.x=Math.max(pr,Math.min(W-pr,p.x));p.y=Math.max(pr,Math.min(H-pr,p.y));
  resolveCircleWallCollision(p,pr,false);
  resolveCoreGuardCollision(p,delta);
}

function updateCore(delta){
  core.vx*=Math.pow(FRICTION,delta);core.vy*=Math.pow(FRICTION,delta);
  core.x+=core.vx*delta;core.y+=core.vy*delta;
  resolveCircleWallCollision(core,CORE_R,true);
  if(core.y-CORE_R<0){core.y=CORE_R;core.vy*=-0.8;}
  if(core.y+CORE_R>H){core.y=H-CORE_R;core.vy*=-0.8;}
  var gT=(H-GOAL_H)/2,gB=gT+GOAL_H;
  if(core.x-CORE_R<GOAL_W){
    if(core.y>gT&&core.y<gB){score[1]++;goalFlash=90;goalTeam=1;document.getElementById('score').textContent=score[0]+' - '+score[1];if(checkWin())return;reset();return;}
    else{core.x=CORE_R+GOAL_W;core.vx*=-0.8;}
  }
  if(core.x+CORE_R>W-GOAL_W){
    if(core.y>gT&&core.y<gB){score[0]++;goalFlash=90;goalTeam=0;document.getElementById('score').textContent=score[0]+' - '+score[1];if(checkWin())return;reset();return;}
    else{core.x=W-CORE_R-GOAL_W;core.vx*=-0.8;}
  }
}

function updateProjectiles(delta){
  for(var i=projectiles.length-1;i>=0;i--){
    var proj=projectiles[i];proj.x+=proj.vx*delta;proj.y+=proj.vy*delta;
    resolveCircleWallCollision(proj,SHOOT_R,false);
    if(proj.x<0||proj.x>W||proj.y<0||proj.y>H){projectiles.splice(i,1);continue;}
    if(Math.hypot(proj.x-core.x,proj.y-core.y)<CORE_R+SHOOT_R){
      var dx=core.x-proj.x,dy=core.y-proj.y,len=Math.hypot(dx,dy)||1;
      applyCoreKick((dx/len)*KICK_FORCE,(dy/len)*KICK_FORCE,players[0].team,players[0],socket?socket.id:null,false);
      projectiles.splice(i,1);
    }
  }
}

function updateCooldowns(delta){
  var dt=delta*16.67;
  if(kickCdLeft>0)kickCdLeft=Math.max(0,kickCdLeft-dt);
  if(shiftCdLeft>0)shiftCdLeft=Math.max(0,shiftCdLeft-dt);
  if(rSkillCdLeft>0)rSkillCdLeft=Math.max(0,rSkillCdLeft-dt);
  document.getElementById('haste-cd').style.width=(shiftCdLeft<=0?100:(1-shiftCdLeft/getShiftSkillCd(selectedShiftSkill))*100)+'%';
  document.getElementById('shoot-cd').style.width=(rSkillCdLeft<=0?100:(1-rSkillCdLeft/getRSkillCd(selectedRSkill))*100)+'%';
}

function drawField(){
  ctx.fillStyle='#3d6fa3';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.strokeRect(2,2,W-4,H-4);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,60,0,Math.PI*2);ctx.stroke();
  var gT=(H-GOAL_H)/2;
  ctx.fillStyle='rgba(74,159,212,0.3)';ctx.fillRect(0,gT,GOAL_W,GOAL_H);
  ctx.fillStyle='rgba(224,90,90,0.3)';ctx.fillRect(W-GOAL_W,gT,GOAL_W,GOAL_H);
  ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=3;
  ctx.strokeRect(0,gT,GOAL_W,GOAL_H);ctx.strokeRect(W-GOAL_W,gT,GOAL_W,GOAL_H);
  if(goalFlash>0){
    ctx.fillStyle=goalTeam===0?'rgba(74,159,212,'+(goalFlash/90*0.35)+')':'rgba(224,90,90,'+(goalFlash/90*0.35)+')';
    ctx.fillRect(0,0,W,H);
    if(runAsHost())goalFlash--;
  }
  if(goalFlash>90){
    ctx.fillStyle='#fff';ctx.font='bold 36px sans-serif';ctx.textAlign='center';
    ctx.fillText(goalTeam===0?'BLUE TEAM WIN!':'RED TEAM WIN!',W/2,H/2-20);ctx.textAlign='left';
  }
  if(paused){
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);ctx.textAlign='left';
  }
  if(coreDebuffUntil>performance.now()){
    ctx.beginPath();ctx.arc(core.x,core.y,CORE_R+6,0,Math.PI*2);
    ctx.strokeStyle='rgba(180,120,255,0.95)';ctx.lineWidth=2.5;ctx.stroke();
  }
  for(var i=0;i<walls.length;i++){
    var wall=walls[i];
    if(wall.expiresAt<=performance.now())continue;
    ctx.fillStyle='rgba(140,180,255,0.25)';
    ctx.fillRect(wall.x-wall.w/2,wall.y-wall.h/2,wall.w,wall.h);
    ctx.strokeStyle='rgba(185,220,255,0.9)';
    ctx.strokeRect(wall.x-wall.w/2,wall.y-wall.h/2,wall.w,wall.h);
  }

function drawCore(){
  ctx.beginPath();ctx.arc(core.x,core.y,CORE_R,0,Math.PI*2);
  ctx.fillStyle='#ffe033';ctx.fill();ctx.strokeStyle='#c8a800';ctx.lineWidth=2.5;ctx.stroke();
}

function drawPlayer(p){
  var aiSizeMult=!p.isPlayer&&performance.now()<p.giantUntil?GIANT_MULT:1;
  var pr=p.isPlayer?PLAYER_R*playerSize*localSizeMultiplier():PLAYER_R*aiSizeMult;
  var isRushing=p.isPlayer?rushLockActive():performance.now()<p.rushUntil;
  var hasHexBuff=!!p.pendingDebuffKick;
  if(p.isPlayer?hasteActive:p.hasteActive){
    ctx.beginPath();ctx.arc(p.x,p.y,pr+6,0,Math.PI*2);ctx.strokeStyle='rgba(100,200,255,0.8)';ctx.lineWidth=3;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();
  if(isRushing){
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();
  }
  if(hasHexBuff){
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();
  }
  drawAvatarFace(p.x,p.y,pr,p.isPlayer?localAvatarCode:('ai'+p.aiUid));
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();
  var disabledUntil=p.isPlayer?localDisabledUntil:p.disabledUntil;
  if(disabledUntil>performance.now()){
    ctx.beginPath();ctx.arc(p.x,p.y,pr+4,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,120,120,0.95)';ctx.lineWidth=2.5;ctx.stroke();
  }
  var guardUntil=p.isPlayer?coreGuardUntil:p.coreGuardUntil;
  if(guardUntil>performance.now()){
    ctx.beginPath();ctx.arc(p.x,p.y,pr+8,0,Math.PI*2);
    ctx.strokeStyle='rgba(120,255,210,0.9)';ctx.lineWidth=2.5;ctx.stroke();
  }
  if(p.isPlayer&&dist(p,core)<pr+CORE_R+20){
    ctx.beginPath();ctx.arc(p.x,p.y,pr+5,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,100,0.9)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(core.x,core.y);ctx.lineTo(mouseX,mouseY);
    ctx.strokeStyle='rgba(255,255,100,0.55)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  }
}

function drawProjectiles(){
  projectiles.forEach(function(proj){
    ctx.beginPath();ctx.arc(proj.x,proj.y,SHOOT_R,0,Math.PI*2);ctx.fillStyle='#ffaa00';ctx.fill();
    var angle=Math.atan2(proj.vy,proj.vx);
    for(var i=0;i<4;i++){
      var a=angle+(i*Math.PI/2);ctx.beginPath();ctx.moveTo(proj.x,proj.y);
      ctx.lineTo(proj.x+Math.cos(a)*9,proj.y+Math.sin(a)*9);ctx.strokeStyle='rgba(255,200,50,0.7)';ctx.lineWidth=1.5;ctx.stroke();
    }
  });
}

function drawRemotePlayers(){
  Object.keys(remotePlayers).forEach(function(id){
    var rp=remotePlayers[id],col=rp.team===0?'#4a9fd4':'#e05a5a';
    if(rp.hasteActive){ctx.beginPath();ctx.arc(rp.x,rp.y,PLAYER_R+6,0,Math.PI*2);ctx.strokeStyle='rgba(100,200,255,0.8)';ctx.lineWidth=3;ctx.stroke();}
    ctx.beginPath();ctx.arc(rp.x,rp.y,PLAYER_R,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    if(rp.rushLockActive){ctx.beginPath();ctx.arc(rp.x,rp.y,PLAYER_R,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();}
    if(rp.pendingDebuffKick){ctx.beginPath();ctx.arc(rp.x,rp.y,PLAYER_R,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();}
    drawAvatarFace(rp.x,rp.y,PLAYER_R,rp.avatarCode||id);
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();
    if(rp.disabledUntil>performance.now()){ctx.beginPath();ctx.arc(rp.x,rp.y,PLAYER_R+4,0,Math.PI*2);ctx.strokeStyle='rgba(255,120,120,0.95)';ctx.lineWidth=2.5;ctx.stroke();}
  });
}
function drawRemoteBots(){
  Object.keys(remoteBots).forEach(function(id){
    var rb=remoteBots[id];
    var aiSizeMult=performance.now()<(rb.giantUntil||0)?GIANT_MULT:1;
    var pr=PLAYER_R*aiSizeMult;
    var x=rb.x,y=rb.y;
    if(rb.hasteActive){
      ctx.beginPath();ctx.arc(x,y,pr+6,0,Math.PI*2);ctx.strokeStyle='rgba(100,200,255,0.8)';ctx.lineWidth=3;ctx.stroke();
    }
    ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);ctx.fillStyle=rb.color||'#888';ctx.fill();
    if((rb.rushUntil||0)>performance.now()){ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.28)';ctx.fill();}
    if(rb.pendingDebuffKick){ctx.beginPath();ctx.arc(x,y,pr,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fill();}
    drawAvatarFace(x,y,pr,id);
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.stroke();
    if((rb.disabledUntil||0)>performance.now()){ctx.beginPath();ctx.arc(x,y,pr+4,0,Math.PI*2);ctx.strokeStyle='rgba(255,120,120,0.95)';ctx.lineWidth=2.5;ctx.stroke();}
    if((rb.coreGuardUntil||0)>performance.now()){ctx.beginPath();ctx.arc(x,y,pr+8,0,Math.PI*2);ctx.strokeStyle='rgba(120,255,210,0.9)';ctx.lineWidth=2.5;ctx.stroke();}
  });
}

function loop(timestamp){
  var delta=lastTime===0?1:Math.min((timestamp-lastTime)/16.67,3);lastTime=timestamp;
  if(!paused){
    if(runAsHost()){
      players.forEach(function(p){updatePlayer(p,delta);});
      updateCore(delta);
   if(!isHost&&_coreBuffer.length>=2){
  var renderTime=performance.now()-50;
  var older=null,newer=null;
  for(var ci=0;ci<_coreBuffer.length-1;ci++){
    if(_coreBuffer[ci].t<=renderTime&&_coreBuffer[ci+1].t>renderTime){
      older=_coreBuffer[ci];newer=_coreBuffer[ci+1];break;
    }
  }
  if(older&&newer){
    var t=(renderTime-older.t)/(newer.t-older.t);
    core.x=older.x+(newer.x-older.x)*t;
    core.y=older.y+(newer.y-older.y)*t;
    }
  }

      updateProjectiles(delta);
    }else{
      updatePlayer(players[0],delta);
    }
  }
  updateCooldowns(delta);
  if(socket&&socket.connected){
    socket.emit('playerMove',{x:players[0].x,y:players[0].y,team:players[0].team,hasteActive:hasteActive,playerNumber:myPlayerNumber,disabledUntil:localDisabledUntil,coreGuardUntil:coreGuardUntil,rushLockActive:rushLockActive(),pendingDebuffKick:players[0].pendingDebuffKick});
    if(isHost){
      socket.emit('coreSync',{x:core.x,y:core.y,vx:core.vx,vy:core.vy});
      var defaultAi=null;
      if(players[1]&&!players[1].isPlayer){
        var d=players[1];
        defaultAi={
          x:d.x,y:d.y,vx:d.vx,vy:d.vy,
          team:d.team,color:d.color,
          hasteActive:!!d.hasteActive,
          disabledUntil:d.disabledUntil||0,
          coreGuardUntil:d.coreGuardUntil||0,
          rushUntil:d.rushUntil||0,
          pendingDebuffKick:!!d.pendingDebuffKick,
          giantUntil:d.giantUntil||0,
          aiUid:d.aiUid
        };
      }
      var botList=[];
      for(var bi=0;bi<players.length;bi++){
        var pl=players[bi];
        if(!pl.isPlayer&&pl.netBotId){
          botList.push({
            id:pl.netBotId,
            ownerId:pl.ownerId,
            x:pl.x,y:pl.y,vx:pl.vx,vy:pl.vy,
            team:pl.team,color:pl.color,
            hasteActive:!!pl.hasteActive,
            disabledUntil:pl.disabledUntil||0,
            coreGuardUntil:pl.coreGuardUntil||0,
            rushUntil:pl.rushUntil||0,
            pendingDebuffKick:!!pl.pendingDebuffKick,
            giantUntil:pl.giantUntil||0,
            aiUid:pl.aiUid
          });
        }
      }
      var projs=projectiles.map(function(pr){return{x:pr.x,y:pr.y,vx:pr.vx,vy:pr.vy};});
      if(!_hostSyncTick)_hostSyncTick=0;
        _hostSyncTick+=delta*16.67;
      if(_hostSyncTick>=33&&isHost){ // 30fps = 33ms
          _hostSyncTick=0;
       socket.emit('hostSimSync',{
       core:{x:core.x,y:core.y,vx:core.vx,vy:core.vy},
       s0:score[0],s1:score[1],
       goalFlash:goalFlash,
       goalTeam:goalTeam,
       defaultAi:defaultAi,
       bots:botList,
       projectiles:projs,
       walls:walls,
       coreDebuffUntil:coreDebuffUntil,
       coreDebuffTeam:coreDebuffTeam
     });
   }



  }
  }
  drawField();drawRemotePlayers();drawRemoteBots();players.forEach(drawPlayer);drawProjectiles();drawCore();
  requestAnimationFrame(loop);
}

function hydrateBotsFromState(bots){
  if(!bots)return;
  Object.keys(bots).forEach(function(id){
    var b=bots[id];
    if(isHost){
      var col=b.team===0?'#4a9fd4':'#e05a5a';
      var p=makePlayer(typeof b.x==='number'?b.x:160,typeof b.y==='number'?b.y:H/2,col,b.team,false);
      p.netBotId=id;p.ownerId=b.ownerId;
      players.push(p);
    }else{
      remoteBots[id]={
        x:b.x,y:b.y,team:b.team,ownerId:b.ownerId,
        color:b.team===0?'#4a9fd4':'#e05a5a',
        hasteActive:false,disabledUntil:0,coreGuardUntil:0,
        rushLockActive:false,pendingDebuffKick:false,giantUntil:0
      };
    }
  });
}
function startSocketConnection(){
  socket=io();
  socket.on('connect',function(){});
  socket.on('disconnect',function(){});
  socket.on('init',function(state){
    mySpawnedBotIds=[];
    isHost=!!state.isHost;
    var myIdx=Object.keys(state.players).indexOf(socket.id);
    myPlayerNumber=myIdx+1;
    localAvatarCode=avatarCodeFromAddressLike(socket.id);
    players[0].team=myIdx%2===0?0:1;players[0].color=players[0].team===0?'#4a9fd4':'#e05a5a';
    Object.keys(state.players).forEach(function(id){
      if(id!==socket.id){
        remotePlayers[id]=state.players[id];
        remotePlayers[id].avatarCode=avatarCodeFromAddressLike(id);
      }
    });
    if(state.bots){
      Object.keys(state.bots).forEach(function(bid){
        if(state.bots[bid].ownerId===socket.id)mySpawnedBotIds.push(bid);
      });
    }
    hydrateBotsFromState(state.bots);
    updateTeamDisplay();
  });
  socket.on('becomeHost',function(){
    isHost=true;
    Object.keys(remoteBots).forEach(function(id){
      var rb=remoteBots[id];
      var col=rb.team===0?'#4a9fd4':'#e05a5a';
      var p=makePlayer(rb.x,rb.y,col,rb.team,false);
      p.netBotId=id;p.ownerId=rb.ownerId||null;
      p.vx=rb.vx||0;p.vy=rb.vy||0;
      p.hasteActive=!!rb.hasteActive;
      p.disabledUntil=rb.disabledUntil||0;
      p.coreGuardUntil=rb.coreGuardUntil||0;
      p.rushUntil=rb.rushUntil||0;
      p.pendingDebuffKick=!!rb.pendingDebuffKick;
      p.giantUntil=rb.giantUntil||0;
      if(rb.aiUid!==undefined)p.aiUid=rb.aiUid;
      players.push(p);
      delete remoteBots[id];
    });
  });
  socket.on('coreSynced',function(data){if(!isHost){core.x=data.x;core.y=data.y;core.vx=data.vx;core.vy=data.vy;}});
  socket.on('hostSimSync',function(data){
    if(isHost||!data)return;
    if(data.core){
      _coreBuffer.push({x:data.core.x,y:data.core.y,vx:data.core.vx,vy:data.core.vy,t:performance.now()});
      if(_coreBuffer.length>12)_coreBuffer.shift();
    }

    if(data.s0!==undefined){
      if(score[0]!==data.s0||score[1]!==data.s1){
        score[0]=data.s0;score[1]=data.s1;
        document.getElementById('score').textContent=score[0]+' - '+score[1];
        players[0].x=players[0].team===0?160:W-160;
        players[0].y=H/2;players[0].vx=0;players[0].vy=0;
      }
    }
    if(data.goalFlash!==undefined)goalFlash=data.goalFlash;
    if(data.goalTeam!==undefined)goalTeam=data.goalTeam;
    if(data.defaultAi&&players[1]&&!players[1].isPlayer){
      var da=data.defaultAi;
      players[1].x=da.x;players[1].y=da.y;players[1].vx=da.vx;players[1].vy=da.vy;
      if(da.team!==undefined)players[1].team=da.team;
      if(da.color)players[1].color=da.color;
      players[1].hasteActive=!!da.hasteActive;
      players[1].disabledUntil=da.disabledUntil||0;
      players[1].coreGuardUntil=da.coreGuardUntil||0;
      players[1].rushUntil=da.rushUntil||0;
      players[1].pendingDebuffKick=!!da.pendingDebuffKick;
      players[1].giantUntil=da.giantUntil||0;
      if(da.aiUid!==undefined)players[1].aiUid=da.aiUid;
    }
    if(data.bots){
      data.bots.forEach(function(b){
        if(!remoteBots[b.id])remoteBots[b.id]={color:b.team===0?'#4a9fd4':'#e05a5a',team:b.team};
        Object.assign(remoteBots[b.id],b);
      });
    }
    if(data.projectiles)projectiles=data.projectiles.map(function(pr){return{x:pr.x,y:pr.y,vx:pr.vx,vy:pr.vy};});
    if(data.walls)walls=data.walls;
    if(typeof data.coreDebuffUntil==='number')coreDebuffUntil=data.coreDebuffUntil;
    if(typeof data.coreDebuffTeam==='number')coreDebuffTeam=data.coreDebuffTeam;
  });
  socket.on('playerJoined',function(data){
    remotePlayers[data.id]=data.data;
    remotePlayers[data.id].avatarCode=avatarCodeFromAddressLike(data.id);
    playJoinChime();
    updateTeamDisplay();
  });
  socket.on('botAdded',function(data){
    if(!data||!data.id)return;
    if(data.ownerId===socket.id)mySpawnedBotIds.push(data.id);
    if(isHost){
      var col=data.team===0?'#4a9fd4':'#e05a5a';
      var p=makePlayer(data.x,data.y,col,data.team,false);
      p.netBotId=data.id;p.ownerId=data.ownerId;
      players.push(p);
    }else{
      remoteBots[data.id]={
        x:data.x,y:data.y,team:data.team,ownerId:data.ownerId,
        color:data.team===0?'#4a9fd4':'#e05a5a',
        hasteActive:false,disabledUntil:0,coreGuardUntil:0,
        rushLockActive:false,pendingDebuffKick:false,giantUntil:0
      };
    }
  });
  socket.on('botSyncedMulti',function(payload){
    if(!payload||!payload.list)return;
    payload.list.forEach(function(b){
      if(b.ownerId===socket.id)return;
      if(!remoteBots[b.id])remoteBots[b.id]={color:b.team===0?'#4a9fd4':'#e05a5a',team:b.team};
      Object.assign(remoteBots[b.id],b);
    });
  });
  socket.on('botRemoved',function(data){
    if(data&&data.id){
      delete remoteBots[data.id];
      var ix=mySpawnedBotIds.indexOf(data.id);
      if(ix>=0)mySpawnedBotIds.splice(ix,1);
      if(isHost){
        for(var ri=players.length-1;ri>=0;ri--){
          if(players[ri].netBotId===data.id){players.splice(ri,1);break;}
        }
      }
    }
  });
  socket.on('playerLeft',function(id){delete remotePlayers[id];updateTeamDisplay();});
  socket.on('playerMoved',function(data){
    if(data.id!==socket.id){
      if(!remotePlayers[data.id])remotePlayers[data.id]={};
      remotePlayers[data.id].x=data.x;remotePlayers[data.id].y=data.y;
      remotePlayers[data.id].team=data.team;remotePlayers[data.id].hasteActive=data.hasteActive;
      remotePlayers[data.id].playerNumber=data.playerNumber;
      remotePlayers[data.id].disabledUntil=data.disabledUntil||0;
      remotePlayers[data.id].coreGuardUntil=data.coreGuardUntil||0;
      remotePlayers[data.id].rushLockActive=!!data.rushLockActive;
      remotePlayers[data.id].pendingDebuffKick=!!data.pendingDebuffKick;
      remotePlayers[data.id].avatarCode=remotePlayers[data.id].avatarCode||avatarCodeFromAddressLike(data.id);
      updateTeamDisplay();
    }
  });
  socket.on('coreKicked',function(data){
    core.vx=data.vx;core.vy=data.vy;
    if(data.debuffTriggered){
      coreDebuffUntil=performance.now()+CORE_DEBUFF_MS;
      coreDebuffTeam=typeof data.debuffTeam==='number'?data.debuffTeam:coreDebuffTeam;
    }
    if(coreDebuffUntil>performance.now()&&typeof data.team==='number'&&data.team!==coreDebuffTeam){
      if(data.kickerId&&remotePlayers[data.kickerId])remotePlayers[data.kickerId].disabledUntil=performance.now()+DEBUFF_STUN_MS;
      coreDebuffUntil=0;coreDebuffTeam=-1;
    }
  });
  socket.on('paused',function(data){
    paused=data.paused;var btn=document.getElementById('btn-pause');
    btn.textContent=paused?'▶ PLAY':'⏸ PAUSE';btn.classList.toggle('active',paused);
  });
  socket.on('projectileSpawned',function(data){projectiles.push({x:data.x,y:data.y,vx:data.vx,vy:data.vy});});
  socket.on('hasteUsed',function(data){if(remotePlayers[data.id])remotePlayers[data.id].hasteActive=true;});
  socket.on('skillEvent',function(data){
    if(data.type==='wall'){walls.push({x:data.x,y:data.y,w:WALL_WIDTH,h:WALL_HEIGHT,expiresAt:performance.now()+WALL_DURATION,team:data.team});}
  });
}
function refreshSkillUI(){
  document.getElementById('r-label').textContent=selectedRSkillLabel(selectedRSkill);
  document.getElementById('shift-label').textContent=selectedShiftSkillLabel(selectedShiftSkill);
}
function tryAutoEnterRoom(){
  if(!selectedRSkill||!selectedShiftSkill||socket)return;
  document.getElementById('skill-select').style.display='none';
  document.getElementById('msg').textContent='WASD:move  LMB:Kick  Shift:'+selectedShiftSkillLabel(selectedShiftSkill).replace(' (Shift)','')+'  R:'+selectedRSkillLabel(selectedRSkill).replace(' (R)','');
  startSocketConnection();
}
document.querySelectorAll('[data-r-skill]').forEach(function(btn){
  btn.addEventListener('click',function(){
    selectedRSkill=btn.getAttribute('data-r-skill');
    document.querySelectorAll('[data-r-skill]').forEach(function(el){el.classList.remove('active');});
    btn.classList.add('active');
    refreshSkillUI();
    tryAutoEnterRoom();
  });
});
document.querySelectorAll('[data-shift-skill]').forEach(function(btn){
  btn.addEventListener('click',function(){
    selectedShiftSkill=btn.getAttribute('data-shift-skill');
    document.querySelectorAll('[data-shift-skill]').forEach(function(el){el.classList.remove('active');});
    btn.classList.add('active');
    refreshSkillUI();
    tryAutoEnterRoom();
  });
});
refreshSkillUI();
fullReset();requestAnimationFrame(loop);
</script>
